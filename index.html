<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresco d.o.o. – Svježe i spremno za upotrebu</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: .75rem;
    }

    header img {
      height: 38px;
      width: auto;
      display: block;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .header-info strong {
      font-size: .95rem;
      font-weight: 700;
      color: #1b1b1b;
      letter-spacing: -.01em;
    }

    .header-info span {
      font-size: .72rem;
      color: #6b7280;
    }

    .header-contact {
      margin-left: auto;
      font-size: .8rem;
      color: #6b7280;
      text-align: right;
      line-height: 1.5;
    }

    .header-contact a {
      color: #2d6a4f;
      text-decoration: none;
      font-weight: 500;
    }

    /* ── PDF ── */
    .pdf-wrap {
      flex: 1;
      overflow: hidden;
    }

    .pdf-wrap embed {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile fallback */
    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      height: 100%;
      text-align: center;
      padding: 2rem;
      color: #6b7280;
    }

    .fallback a {
      display: inline-block;
      padding: .6rem 1.4rem;
      background: #2d6a4f;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .header-contact { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Fresco logo" />
    <div class="header-info">
      <strong>FRESCO d.o.o.</strong>
      <span>Svježe i spremno za upotrebu</span>
    </div>
    <div class="header-contact">
      <div>Savica I. 139, 10 000 Zagreb &nbsp;·&nbsp; OIB: 18311048687</div>
      <div><a href="tel:+385976440460">+385 97 6440 460</a></div>
    </div>
  </header>

  <div class="pdf-wrap" id="pdfWrap">
    <embed
      id="pdfEmbed"
      src="document.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
      type="application/pdf"
    />
    <div class="fallback" id="fallback">
      <p>Vaš uređaj ne podržava prikaz PDF-a u pregledniku.</p>
      <a href="document.pdf" download>Preuzmi dokument</a>
    </div>
  </div>

  <script>
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
      document.getElementById('pdfEmbed').style.display = 'none';
      document.getElementById('fallback').style.display = 'flex';
    }
  </script>

</body>
</html>
