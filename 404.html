<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresco d.o.o. – Stranica nije pronađena</title>
  <link rel="icon" type="image/png" href="Fresco-icon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0c0a07;
      color: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    img { height: 64px; width: 64px; object-fit: contain; background: #fff; border-radius: 50%; padding: 6px; margin-bottom: .5rem; }
    h1 { font-size: 1.1rem; font-weight: 700; color: #f5f0e8; letter-spacing: .03em; }
    p  { font-size: .85rem; color: rgba(255,255,255,.4); }
    a  { color: #e8883a; text-decoration: none; font-weight: 600; font-size: .9rem; transition: color .15s; }
    a:hover { color: #f0a060; }
  </style>
</head>
<body>
  <img src="Fresco-icon.png" alt="Fresco logo" />
  <h1>FRESCO d.o.o.</h1>
  <p>Stranica nije pronađena.</p>
  <a href="/">Povratak na početnu</a>
</body>
</html>
